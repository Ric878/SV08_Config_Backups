[mcu cartographer] # See https://www.klipper3d.org/Config_Reference.html#mcu
serial: /dev/serial/by-id/usb-Cartographer_stm32g431xx_280045000850525537333120-if00
restart_method: command # Not needed for probes using CAN. 

[cartographer]
mcu: cartographer
x_offset: 0                  # This is the offset of your probe from the nozzle tip, to the centre of the coil.
y_offset: 19.25              # This is the offset of your probe from the nozzle tip, to the centre of the coil.
verbose: yes                 # For extra output

[axis_twist_compensation]

[bed_mesh]
zero_reference_position: 175, 175 # The centre of your bed. 
speed: 300
horizontal_move_z: 3    #3
mesh_min: 15,20         # The first probed coordinate, nearest to the origin. This coordinate is relative to the probe's location.
mesh_max: 330,330       # The probed coordinate farthest from the origin. This is not necessarily the last point probed, as the probing process occurs in a zig-zag fashion. As with mesh_min, this coordinate is relative to the probe's location.
mesh_pps: 0,0           # Disable interpolation - mesh is probably dense enough
probe_count: 20,20
adaptive_margin: 10
algorithm: bicubic
#bicubic_tension: 0.2
#split_delta_z: .010
#scan_overshoot: 5

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

#[adxl345]
#cs_pin: cartographer:PA0 # For Cartographer V4
#spi_bus: spi1

#[resonance_tester]
#accel_chip: adxl345
#probe_points:
#    <blank>, <blank>, 20 # Fill out the blank with x and y coordinates where you want to run the resonance test.



[homing_override]
gcode:
  # Move 5 up, just in case (this is our safety zhop, this needs 'set_position_z: 0' below)
  G91 ; set relative positioning
  G0 Z5 F1000 ; 5 up zhop
  {% if not rawparams or 'Y' in rawparams %}
    {action_respond_info('Homing Y')}
    G28 Y
    G90 ; set absolute positioning
    G0 Y175 F9000 ; return to center
    M400 ; Wait for move to finish
  {% endif %}
  {% if not rawparams or 'X' in rawparams %}
    {action_respond_info('Homing X')}
    G28 X
    G90 ; set absolute positioning
    G0 X175 F9000 ; return to center
    M400 ; Wait for move to finish
  {% endif %}
  {% if not rawparams or 'Z' in rawparams %}
    {action_respond_info('Homing Z')}
    G90 ; set absolute positioning
    G0 X175 Y175 F9000 ; return to center, please add your offsets manually if you want to
    G28 Z
    G0 Z10 F1000 ; move to z10 before probe
#    CARTOGRAPHER_TOUCH_HOME
    G0 Z5 F1000 ; move to z5 to finish
    M400 ; Wait for move to finish
  {% endif %}
  G90 ; set absolute positioning
axes: xyz
set_position_z: 0 # This forces the z position to be at 0 when we start homing, so we can move the Z up before homing.

