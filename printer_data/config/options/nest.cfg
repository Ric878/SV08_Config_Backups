[mcu nest]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_390034000A50323756343420-if00
# Edit with the serial of Birds' Nest. Use ls /dev/serial/by-id/* to find it.

[filament_switch_sensor filament_runout_sensor_t0]
switch_pin: ^nest:PB9
pause_on_runout: False
runout_gcode:
  M117 Filament Runout Detected on tool/lane 0!  # Message on display
  M118 Filament Runout Detected on tool/lane 0!  # Message in console
  HANDLE_RUNOUT TOOL=0
#  PAUSE # [pause_resume] is required in printer.cfg
insert_gcode:
  M117 Filament switch inserted

[filament_motion_sensor filament_motion_sensor_t0]
switch_pin: ^nest:PB4
detection_length: 7
extruder: extruder
pause_on_runout: False
runout_gcode:
  M117 Filament Jam/Tangle Detected on tool/lane 0!  # Message on display
  M118 Filament Jam/Tangle Detected on tool/lane 0!  # Message in console
  HANDLE_RUNOUT TOOL=0
#  PAUSE # [pause_resume] is required in printer.cfg
insert_gcode:
  M117 Filament encoder inserted

[filament_switch_sensor filament_runout_sensor_t1]
switch_pin: ^nest:PB8
pause_on_runout: False
runout_gcode:
  M117 Filament Runout Detected on tool/lane 1!  # Message on display
  M118 Filament Runout Detected on tool/lane 1!  # Message in console
  HANDLE_RUNOUT TOOL=1
#  PAUSE # [pause_resume] is required in printer.cfg
insert_gcode:
  M117 Filament switch inserted

[filament_motion_sensor filament_motion_sensor_t1]
switch_pin: ^!nest:PA2
detection_length: 7
extruder: extruder1
pause_on_runout: False
runout_gcode:
  M117 Filament Jam/Tangle Detected on tool/lane 1!  # Message on display
  M118 Filament Jam/Tangle Detected on tool/lane 1!  # Message in console
  HANDLE_RUNOUT TOOL=1
#  PAUSE # [pause_resume] is required in printer.cfg
insert_gcode:
  M117 Filament encoder inserted

[filament_switch_sensor filament_runout_sensor_t2]
switch_pin: ^nest:PB7
pause_on_runout: False
runout_gcode:
  M117 Filament Runout Detected on tool/lane 2!  # Message on display
  M118 Filament Runout Detected on tool/lane 2!  # Message in console
  HANDLE_RUNOUT TOOL=2
#  PAUSE # [pause_resume] is required in printer.cfg
insert_gcode:
  M117 Filament switch inserted

[filament_motion_sensor filament_motion_sensor_t2]
switch_pin: ^!nest:PA6
detection_length: 7
extruder: extruder2
pause_on_runout: False
runout_gcode:
  M117 Filament Jam/Tangle Detected on tool/lane 2!  # Message on display
  M118 Filament Jam/Tangle Detected on tool/lane 2!  # Message in console
  HANDLE_RUNOUT TOOL=2
#  PAUSE # [pause_resume] is required in printer.cfg
insert_gcode:
  M117 Filament encoder inserted









