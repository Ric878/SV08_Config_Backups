#####################
## all led effects ##
#####################

[led_effect critical_error]
leds:
    neopixel:T0_leds
    neopixel:T1_leds
    neopixel:T2_leds
    neopixel:T3_leds
    neopixel:T4_leds
layers:
    strobe         1  1.5   add        (1.0,  1.0, 1.0, 1.0)
    breathing      2  0     difference (0.95, 0.0, 0.0, 0)
    static         1  0     top        (1.0,  0.0, 0.0, 0)
autostart:                             false
frame_rate:                            24
run_on_error:                          true



