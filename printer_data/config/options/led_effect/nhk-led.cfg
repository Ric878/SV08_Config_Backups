##########################
# LED Effects Animations #
##########################

##################
## logo effects ##
##################

[led_effect logo_busy]
autostart:              false
frame_rate:             24
leds:
    neopixel:T0_leds (1)
    neopixel:T1_leds (1)
    neopixel:T2_leds (1)
    neopixel:T3_leds (1)
    neopixel:T4_leds (1)
layers:
    breathing  3 1 top (1,0,0)

