##################
# LED ASSIGNMENT #
##################

[neopixel T0_leds]
pin: NHK0:gpio7
chain_count: 1
color_order: GRBW
initial_RED: 1.0
initial_GREEN: 0.0
initial_BLUE: 1.0
initial_WHITE: 0.0

[neopixel T1_leds]
pin: NHK1:gpio7
chain_count: 1
color_order: GRBW
initial_RED: 1.0
initial_GREEN: 0.0
initial_BLUE: 1.0
initial_WHITE: 0.0

[neopixel T2_leds]
pin: NHK2:gpio7
chain_count: 1
color_order: GRBW
