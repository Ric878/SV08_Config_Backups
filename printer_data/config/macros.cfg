    SET_FILAMENT_SENSOR SENSOR=filament_motion_sensor_t1 ENABLE=0
    SET_FILAMENT_SENSOR SENSOR=filament_runout_sensor_t2 ENABLE=0
    SET_FILAMENT_SENSOR SENSOR=filament_motion_sensor_t2 ENABLE=0
    { action_respond_info("BTT SFS 2.0 sensors disabled on boot.") }

[gcode_macro HANDLE_RUNOUT]
description: Only pauses the print if the runout occurs on the currently active tool
gcode:
    # Get the tool number passed from the sensor that triggered
    {% set TRIGGERED_TOOL = params.TOOL|int %}
    
    # Get the currently active tool from Klipper's state
    {% set ACTIVE_TOOL = printer.toolhead.extruder | replace("extruder", "") %}
    
    # Klipper names the first extruder "" (blank) or "extruder", so we need to handle T0
    {% if ACTIVE_TOOL == "" %}
        {% set ACTIVE_TOOL = 0 %}
    {% else %}
        {% set ACTIVE_TOOL = ACTIVE_TOOL|int %}
    {% endif %}

    # Check if the triggered sensor belongs to the active tool
    {% if TRIGGERED_TOOL == ACTIVE_TOOL %}
        {action_respond_info("Filame runout/jam detected on active Tool T%d! Pausing print." % (ACTIVE_TOOL))}
        PAUSE
    {% else %}
        {action_respond_info("Ignored ghost trigger on parked Tool T%d." % (TRIGGERED_TOOL))}
    {% endif %}


################################################################
# led_effect mavros
##############
# The Macros #
##############
#     Reminder!
#         Once you have confirmed that the LEDs are set up correctly, you must now decide where you want 
#         these macros called up...which means adding them to your existing gcode macros.  NOTHING will happen
#         unless you add the STATUS_????? macros to your existing gcode macros.  
#
#           Example: add STATUS_LEVELING to the beginning of your QGL gcode macro, and then add STATUS_READY 
#                    to the end of it to set the logo LED and nozzle LEDs back to the `ready` state.
#
#           Example: add STATUS_CLEANING to the beginning of your nozzle-cleaning macro, and then STATUS_READY
#                    to the end of it to return the LEDs back to `ready` state.


[gcode_macro TOOLHEAD_LEDS_ON]
gcode:
    STOP_LED_EFFECTS
    set_logo_leds_on

[gcode_macro TOOLHEAD_LEDS_OFF]
gcode:
    STOP_LED_EFFECTS
    set_logo_leds_off
    
[gcode_macro Rainbow_Toolhead]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=rainbow

[gcode_macro set_logo_leds_off]
gcode:
    SET_LED_EFFECT EFFECT=set_logo_leds STOP=1

[gcode_macro set_logo_leds_on]
gcode:
    SET_LED_EFFECT EFFECT=set_logo_leds


