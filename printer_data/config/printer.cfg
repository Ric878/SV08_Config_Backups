[resonance_tester]
accel_chip: adxl345 T0
sweeping_accel: 400
sweeping_period: 0
probe_points: 175, 175, 20

[firmware_retraction]

[idle_timeout]
gcode: _IDLE_TIMEOUT
timeout: 600

[gcode_arcs]                       
resolution: 1.0        

[pause_resume]

[exclude_object]

[save_variables]
filename = ~/printer_data/config/saved_variables.cfg

