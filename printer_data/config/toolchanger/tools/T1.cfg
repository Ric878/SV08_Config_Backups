# if you want to use this file in your actual tool changer then remove the `example_` from the filename.


# This file contains common pin mappings for the BIGTREETECH EBBT0
# Canbus board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB0/PB1)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle.

# See docs/Config_Reference.md for a description of parameters.

[mcu NHK1]
##  Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
##--------------------------------------------------------------------
#serial: /dev/serial/by-id/usb-Klipper_rp2040_323232323619189B-if00 # Red
serial: /dev/serial/by-id/usb-Klipper_rp2040_323232323619B65E-if00 # Orange
#serial: /dev/serial/by-id/usb-Klipper_rp2040_32323232361958A6-if00 # Yelow
#serial: /dev/serial/by-id/usb-Klipper_rp2040_3232323236199CCA-if00 # Green
#serial: /dev/serial/by-id/usb-Klipper_rp2040_3033393834064E65-if00 # Blue

restart_method: command

[adxl345 T1]
cs_pin: NHK1:gpio27
spi_software_sclk_pin: NHK1:gpio18
spi_software_mosi_pin: NHK1:gpio20
spi_software_miso_pin: NHK1:gpio19
axes_map: -x, -z, -y

[extruder1]
step_pin: NHK1:gpio23
dir_pin: NHK1:gpio24
enable_pin: !NHK1:gpio25
microsteps: 16
rotation_distance: 23.056			#Be sure to calibrate
full_steps_per_rotation: 200
gear_ratio: 50:10
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: NHK1:gpio9
#sensor_type: Generic 3950
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: NHK1:gpio29
pullup_resistor: 2200
min_temp: 0
max_temp: 300
min_extrude_temp: 170
#max_extrude_only_distance: 1000 # pre Box Turtle Setting
max_extrude_only_distance: 400
max_extrude_cross_section: 30 # Pre Box Turtle Setting
#max_extrude_cross_section: 50 # Box Turtle Setting
pressure_advance: 0.052                  #Be sure to calibrate
pressure_advance_smooth_time: 0.040
control = pid
pid_Kp=28.334
pid_Ki=3.097
pid_Kd=64.814

[tmc2209 extruder1]
sense_resistor: 0.100
uart_pin: NHK1:gpio0
tx_pin: NHK1:gpio1
interpolate: false
run_current: 0.55                        #.45 minimum offers 12N of force. DO NOT EXCEED .55A as it will cause excess heat.


[heater_fan T1_hotend_fan]
pin: NHK1:gpio5
max_power: 1.0
kick_start_time: 0.5
heater: extruder1
heater_temp: 50.0
## Speed ​​monitoring:
tachometer_pin: NHK1:gpio16
tachometer_ppr: 2
tachometer_poll_interval: 0.0009

[fan_generic T1_part_fan]
pin: NHK1:gpio6
kick_start_time: .3
off_below: 0.1

[gcode_macro T1]
variable_active: 0
variable_color: ""
gcode:
    SELECT_TOOL T=1


#change the tool numbers to the tool you are configuring, ie T0, T1, etc
[tool T1]
#change this too
tool_number: 1
#if this were T1, then this would be extruder1, etc
extruder: extruder1
#Change T0_partfan to tool number
fan: T1_part_fan

#These are build specific, its where the tool is sititng in it's dock.
params_park_x: 98.20
params_park_y: 14.90
params_park_z: 276.50

gcode_x_offset: -0.290    # The X-Axis offset of the nozzle's orifice in relation to tool 0
gcode_y_offset: 0.470     # The Y-Axis offset of the nozzle's orifice in relation to tool 0
gcode_z_offset: 0.790   # The Z-Axis offset of the nozzle's orifice in relation to tool 0 Lower number is more squish

# For InputShaper run per tool and enter the frequency here
params_input_shaper_type_x: 'EI'
params_input_shaper_freq_x: 47.6
params_input_shaper_damping_ratio_x: 0.125

params_input_shaper_type_y: '3HUMP_EI'
params_input_shaper_freq_y: 61.6
params_input_shaper_damping_ratio_y: 0.061

[tool_probe T1]
pin: NHK1:gpio10
tool: 1
z_offset: 0
speed: 5
samples: 3
samples_result: median
sample_retract_dist: 2
lift_speed: 5
samples_tolerance: 0.006
samples_tolerance_retries: 3
activate_gcode: _TAP_PROBE_ACTIVATE HEATER=extruder1

## PCB Activity Light
[output_pin NHK1_PCB_led]
pin: !NHK1:gpio8

#####################################################################
#   Addtional Sensors
#####################################################################
[temperature_sensor NHK1]
sensor_type: temperature_mcu
sensor_mcu: NHK1
min_temp: 0
max_temp: 100
